name: Android Build Sandbox

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5

    - name: Build Debug APK
      run: gradle assembleDebug

    - name: Send APK to Telegram
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Dynamically find the APK file path
        APK_PATH=$(ls build/outputs/apk/debug/*.apk | head -n 1)
        
        echo "Found APK at: $APK_PATH"
        
        # Send it to Telegram using curl
        curl -F document=@"$APK_PATH" \
             "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument?chat_id=${CHAT_ID}&caption=New Sandbox Build is Ready! 🚀"
