name: Android Build Sandbox

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'

    # This ensures the Android SDK tools are ready and licenses are accepted
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.5
        cache-disabled: true

    - name: Build Debug APK
      run: gradle --no-daemon assembleDebug

    - name: Send APK to Telegram
      if: ${{ success() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
      env:
        BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)
        echo "Found APK at: $APK_PATH"

        curl -F document=@"$APK_PATH" \
             -F chat_id="$CHAT_ID" \
             -F caption="New Sandbox Build is Ready! 🚀" \
             "https://api.telegram.org/bot${BOT_TOKEN}/sendDocument"
